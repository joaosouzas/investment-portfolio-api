# =============================================================================
# INVESTMENT PORTFOLIO API — CI/CD Pipeline
# =============================================================================
# Este workflow roda automaticamente em todo push e pull request.
#
# O que ele faz:
#   1. Configura o Java 21
#   2. Sobe um PostgreSQL temporário para os testes de integração
#   3. Compila o projeto com Maven
#   4. Roda todos os testes (unitários + integração)
#   5. Gera o relatório de cobertura com JaCoCo
# =============================================================================

name: CI — Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Banco de dados temporário para os testes de integração
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_portfolio_db
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      # 1. Faz checkout do código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configura o JDK 21
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven       # faz cache das dependências Maven para acelerar builds

      # 3. Valida que o projeto compila sem erros
      - name: Compilar projeto
        run: ./mvnw compile -B
        # -B = batch mode (sem output interativo, melhor para CI)

      # 4. Roda todos os testes
      # Os testes de integração usam H2 em memória (ver src/test/resources/application.yml)
      # Não dependem do PostgreSQL do service acima
      - name: Rodar testes
        run: ./mvnw test -B
        env:
          # Variáveis necessárias para o application.yml principal
          # (os testes usam application.yml próprio com H2, mas o contexto precisa das vars)
          DB_URL:            jdbc:h2:mem:testdb
          DB_USERNAME:       sa
          DB_PASSWORD:       ""
          JWT_SECRET:        404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
          JWT_EXPIRATION:    86400000
          ALPHAVANTAGE_KEY:  test-key-ci

      # 5. Publica o relatório de testes como artefato do workflow
      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()    # roda mesmo se os testes falharam
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      # 6. Gera e publica o relatório de cobertura JaCoCo
      - name: Gerar relatório de cobertura
        run: ./mvnw jacoco:report -B
        if: success()

      - name: Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

      # 7. Resumo do build no GitHub
      - name: Resumo do build
        if: always()
        run: |
          echo "## Resultado do Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Java:** 21 (Temurin)" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
