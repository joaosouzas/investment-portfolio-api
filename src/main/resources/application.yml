spring:
  datasource:
    # Se não houver variável, tenta o localhost (padrão de dev)
    url: ${DB_URL:jdbc:postgresql://localhost:5432/portfolio_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  # Aqui não colocamos padrão por segurança: se não houver variável, o app nem sobe
  secret-key: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

alphavantage:
  api-key: ${ALPHAVANTAGE_KEY}
  base-url: https://www.alphavantage.co